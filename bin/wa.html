<div id="ystoore-premium-widget">
  <div class="cta-wrapper">
    <span class="cta-text">checkout sekarang</span>
  </div>

  <div class="button-container">
    <div class="pulse-ring"></div>
    <div class="pulse-ring-delayed"></div>

    <button
      onclick="handleChatClick()"
      class="main-btn"
      aria-label="Chat Admin"
    >
      <svg
        width="30"
        height="30"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M12 2C6.48 2 2 6.03 2 11C2 13.09 2.8 15.01 4.14 16.5C3.71 18.12 2.81 19.5 2.81 19.5C2.81 19.5 4.38 19.56 6.32 18.77C7.94 19.56 9.87 20 12 20C17.52 20 22 15.97 22 11C22 6.03 17.52 2C12 2Z"
          fill="white"
        />
        <circle cx="8" cy="11" r="1.5" fill="#16a34a" />
        <circle cx="12" cy="11" r="1.5" fill="#16a34a" />
        <circle cx="16" cy="11" r="1.5" fill="#16a34a" />
      </svg>
    </button>

    <button onclick="hideWidget()" class="close-x">&times;</button>
  </div>
</div>

<style>
  #ystoore-premium-widget {
    position: fixed;
    bottom: 30px;
    right: 40px; /* Posisi kanan sedikit digeser sesuai request */
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: "Inter", sans-serif;
  }

  /* Animasi Floating Teks CTA */
  .cta-wrapper {
    margin-bottom: 15px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
  }

  #ystoore-premium-widget:hover .cta-wrapper {
    opacity: 1;
    transform: translateY(0);
  }

  .cta-text {
    background: white;
    color: #ea580c; /* Orange-600 */
    padding: 8px 18px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    white-space: nowrap;
    border: 1px solid #f1f1f1;
  }

  .button-container {
    position: relative;
    width: 65px;
    height: 65px;
  }

  /* Tombol Utama */
  .main-btn {
    width: 100%;
    height: 100%;
    background-color: #16a34a; /* Green-600 */
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 15px 30px rgba(22, 163, 74, 0.3);
    position: relative;
    z-index: 2;
    transition: transform 0.3s ease;
  }

  .main-btn:hover {
    transform: scale(1.05);
    background-color: #15803d;
  }

  /* Efek Pendaran Persis Gambar (Pulse) */
  .pulse-ring,
  .pulse-ring-delayed {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #22c55e;
    border-radius: 50%;
    opacity: 0;
    z-index: 1;
    animation: pulse-animation 2s infinite
      cubic-bezier(0.455, 0.03, 0.515, 0.955);
  }

  .pulse-ring-delayed {
    animation-delay: 0.5s;
  }

  @keyframes pulse-animation {
    0% {
      transform: scale(1);
      opacity: 0.6;
    }
    100% {
      transform: scale(1.8);
      opacity: 0;
    }
  }

  /* Tombol Close */
  .close-x {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 22px;
    height: 22px;
    background: #374151;
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #ystoore-premium-widget:hover .close-x {
    opacity: 1;
  }

  .close-x:hover {
    background: #ef4444;
  }
</style>

<script>
  function handleChatClick() {
    const msg = encodeURIComponent(
      "Halo Admin Ystoore, gue mau tanya paket Netflix-nya dong!",
    );
    window.open("https://wa.me/6282211910246?text=" + msg, "_blank");
  }

  function hideWidget() {
    document.getElementById("ystoore-premium-widget").style.display = "none";
  }
</script>
