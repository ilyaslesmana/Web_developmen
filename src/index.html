<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gostream | Digital Solution</title>
    <style>
      :root {
        --primary-color: #2563eb;
        --dark-bg: #0f172a;
        --text-light: #f8fafc;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--dark-bg);
        color: var(--text-light);
        line-height: 1.6;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        text-align: center;
        padding: 20px;
        border: 1px solid #334155;
        border-radius: 12px;
        background: #1e293b;
      }
      .badge {
        background: var(--primary-color);
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      h1 {
        margin-top: 20px;
      }
      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 25px;
        background: #10b981;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="badge">Sistem Informasi Project</span>
      <h1>Gostream Digital</h1>
      <p>Premium Account Services & Data-Driven Solutions</p>
      <p><i>"Fokus pada proses, hasil akan mengikuti."</i></p>
      <a href="https://shopee.co.id/your-shop" class="btn">Order di Shopee</a>
    </div>
  </body>
</html>
